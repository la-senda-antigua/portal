<div class="main-container">
  <div class="calendar-list">
    <a routerLink="/" mat-stroked-button class="full-width"
      ><mat-icon>arrow_back</mat-icon>back</a
    >

    <div class="calendar-header">
      <span>My Calendars</span>
      <button
        mat-icon-button
        class="add-button"
        (click)="openAddCalendarModal()"
      >
        <mat-icon>add</mat-icon>
      </button>
    </div>

    @if (calendarListLoading()) {
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    } @else {
      <mat-checkbox
         class="select-all-checkbox"
         [checked]="selectedCalendars().length === myCalendars().length"
         (change)="toggleSelectAll($event)"
      >
        Select all
      </mat-checkbox>
      <mat-divider></mat-divider>
      <mat-selection-list
        class="calendars-scroll-container"
        (selectionChange)="onCalendarSelectionChange($event)"
      >
        @for (item of myCalendars(); track item.id) {
          <div class="calendar-item">
            <mat-list-option
              [value]="item.id"
              [selected]="selectedCalendars().includes(item.id!)"
              togglePosition="before"
              [style.--checkbox-color]="item.color"
            >
              {{ item.name }}
            </mat-list-option>

            <span
              matTooltip="You don't have permission to make edits this calendar"
              [matTooltipDisabled]="item.iAmManager"
            >
              <button
                mat-icon-button
                class="more-options"
                (click)="showCalendarOptions($event, item)"
                [disabled]="!item.iAmManager"
              >
                <mat-icon>more_vert</mat-icon>
              </button>
            </span>
          </div>
        }
      </mat-selection-list>
    }

    <button
      mat-stroked-button
      color="primary"
      (click)="openAddOrEditEventDialog()"
      class="full-width add-event-button"
    >
      Add Event
      <mat-icon>add</mat-icon>
    </button>
  </div>
  <div class="calendar-view">
    <mat-progress-bar
      mode="indeterminate"
      class="progress-bar"
      [class.invisible]="!calendarEventsLoading()"
    ></mat-progress-bar>

    <full-calendar [options]="calendarOptions"></full-calendar>
  </div>
</div>
